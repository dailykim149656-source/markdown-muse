options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.ai
      - -t
      - ${_IMAGE_URI}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE_URI}
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_IMAGE_URI}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --ingress=all
      - --service-account=${_RUN_SERVICE_ACCOUNT}
      - --set-env-vars=GOOGLE_GENAI_USE_VERTEXAI=true,GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=${_VERTEX_LOCATION},GEMINI_MODEL=${_GEMINI_MODEL},GEMINI_FALLBACK_MODEL=${_GEMINI_FALLBACK_MODEL},AI_ALLOWED_ORIGIN=${_AI_ALLOWED_ORIGIN},GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID},GOOGLE_OAUTH_REDIRECT_URI=${_GOOGLE_OAUTH_REDIRECT_URI},WORKSPACE_FRONTEND_ORIGIN=${_WORKSPACE_FRONTEND_ORIGIN},GOOGLE_WORKSPACE_SCOPES=${_GOOGLE_WORKSPACE_SCOPES},TEX_SERVICE_BASE_URL=${_TEX_SERVICE_BASE_URL}
      - --update-secrets=GOOGLE_CLIENT_SECRET=${_GOOGLE_CLIENT_SECRET_SECRET}:latest,TEX_SERVICE_AUTH_TOKEN=${_TEX_SERVICE_AUTH_TOKEN_SECRET}:latest
substitutions:
  _REGION: asia-northeast3
  _VERTEX_LOCATION: asia-northeast3
  _SERVICE_NAME: docsy
  _GEMINI_MODEL: gemini-3.1-flash-lite-preview
  _GEMINI_FALLBACK_MODEL: gemini-2.5-flash
  _AI_ALLOWED_ORIGIN: "*"
  _GOOGLE_CLIENT_ID: ""
  _GOOGLE_OAUTH_REDIRECT_URI: ""
  _WORKSPACE_FRONTEND_ORIGIN: ""
  _GOOGLE_WORKSPACE_SCOPES: "openid email profile https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/drive.metadata.readonly https://www.googleapis.com/auth/documents"
  _GOOGLE_CLIENT_SECRET_SECRET: google-client-secret
  _TEX_SERVICE_AUTH_TOKEN_SECRET: tex-service-auth-token
  _TEX_SERVICE_BASE_URL: ""
  _RUN_SERVICE_ACCOUNT: "399359781191-compute@developer.gserviceaccount.com"
images:
  - ${_IMAGE_URI}
