name: Deploy AI Service

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-ai.yml"
      - ".github/workflows/deploy-full-stack.yml"
      - "Dockerfile.ai"
      - "cloudbuild.ai.yaml"
      - "server/**"
      - "server/modules/config/**"
      - "scripts/validate-public-deploy-config.mjs"
      - "src/lib/ai/client.ts"
      - "src/types/tex.ts"
      - "!server/texService.ts"
      - "!server/modules/tex/compiler.ts"
      - "!server/modules/tex/diagnostics.ts"
  workflow_dispatch:

concurrency:
  group: deploy-ai-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-ai:
    name: Deploy AI service (Cloud Run)
    runs-on: ubuntu-latest
    env:
      GCP_REGION: asia-northeast3
      VERTEX_LOCATION: asia-northeast3
      AI_SERVICE_NAME: docsy
      ARTIFACT_REPOSITORY: docsy
      GEMINI_MODEL: gemini-3.1-flash-lite-preview
      GEMINI_FALLBACK_MODEL: gemini-2.5-flash
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Show active GCP deploy principal
        run: |
          set -euo pipefail
          ACTIVE_ACCOUNT="$(gcloud auth list --filter=status:ACTIVE --format='value(account)' | head -n 1)"
          echo "Active gcloud account: ${ACTIVE_ACCOUNT}"

      - name: Deploy AI service via Cloud Build
        id: ai
        run: |
          set -euo pipefail

          DEFAULT_FRONTEND_ORIGIN="https://docsy.cyou"
          DEFAULT_GOOGLE_OAUTH_REDIRECT_URI="${DEFAULT_FRONTEND_ORIGIN}/api/auth/google/callback"

          require_secret() {
            local name="$1"
            local value="$2"
            if [ -z "${value}" ]; then
              echo "${name} is required."
              exit 1
            fi
          }

          ensure_secret_access() {
            local secret_name="$1"
            local output
            if ! output="$(gcloud secrets versions access latest --secret="${secret_name}" --project "${PROJECT_ID}" 2>&1 >/dev/null)"; then
              echo "Unable to access required Secret Manager secret ${secret_name}."
              if printf '%s' "${output}" | grep -qi 'NOT_FOUND'; then
                echo "Secret ${secret_name} was not found in project ${PROJECT_ID}."
              elif printf '%s' "${output}" | grep -qi 'PERMISSION_DENIED'; then
                ACTIVE_ACCOUNT="$(gcloud auth list --filter=status:ACTIVE --format='value(account)' | head -n 1)"
                echo "Grant roles/secretmanager.secretAccessor on ${secret_name} to ${ACTIVE_ACCOUNT}."
              fi
              echo "${output}"
              exit 1
            fi
          }

          get_optional_secret_status() {
            local secret_name="$1"
            local output
            if output="$(gcloud secrets versions access latest --secret="${secret_name}" --project "${PROJECT_ID}" 2>&1 >/dev/null)"; then
              echo "present"
              return 0
            fi

            if printf '%s' "${output}" | grep -qi 'NOT_FOUND'; then
              echo "missing"
              return 0
            fi

            echo "Unable to access optional Secret Manager secret ${secret_name}."
            echo "${output}"
            exit 1
          }

          require_secret "GCP_PROJECT_ID" "${{ secrets.GCP_PROJECT_ID }}"
          require_secret "GCP_GOOGLE_CLIENT_ID" "${{ secrets.GCP_GOOGLE_CLIENT_ID }}"

          TEX_SERVICE_BASE_URL="${{ secrets.GCP_TEX_SERVICE_BASE_URL }}"
          if [ -z "${TEX_SERVICE_BASE_URL}" ]; then
            echo "GCP_TEX_SERVICE_BASE_URL is required."
            exit 1
          fi

          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          PROJECT_NUMBER="$(gcloud projects describe "${PROJECT_ID}" --format='value(projectNumber)')"
          RUN_SERVICE_ACCOUNT="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"

          ALLOWED_ORIGIN="${{ secrets.GCP_AI_ALLOWED_ORIGIN }}"
          if [ -z "${ALLOWED_ORIGIN}" ]; then
            ALLOWED_ORIGIN="${DEFAULT_FRONTEND_ORIGIN}"
          fi

          WORKSPACE_FRONTEND_ORIGIN="${{ secrets.GCP_WORKSPACE_FRONTEND_ORIGIN }}"
          if [ -z "${WORKSPACE_FRONTEND_ORIGIN}" ]; then
            WORKSPACE_FRONTEND_ORIGIN="${ALLOWED_ORIGIN}"
          fi

          GOOGLE_OAUTH_REDIRECT_URI="${{ secrets.GCP_GOOGLE_OAUTH_REDIRECT_URI }}"
          if [ -z "${GOOGLE_OAUTH_REDIRECT_URI}" ]; then
            GOOGLE_OAUTH_REDIRECT_URI="${DEFAULT_GOOGLE_OAUTH_REDIRECT_URI}"
          fi
          GOOGLE_OAUTH_REDIRECT_URI="$(node scripts/normalize-google-oauth-redirect-uri.mjs "${GOOGLE_OAUTH_REDIRECT_URI}" "${WORKSPACE_FRONTEND_ORIGIN}")"

          GOOGLE_OAUTH_PUBLISHING_STATUS="${{ secrets.GCP_GOOGLE_OAUTH_PUBLISHING_STATUS }}"
          if [ -z "${GOOGLE_OAUTH_PUBLISHING_STATUS}" ]; then
            GOOGLE_OAUTH_PUBLISHING_STATUS="testing"
          fi

          GOOGLE_WORKSPACE_SCOPE_PROFILE="${{ secrets.GCP_GOOGLE_WORKSPACE_SCOPE_PROFILE }}"
          if [ -z "${GOOGLE_WORKSPACE_SCOPE_PROFILE}" ]; then
            GOOGLE_WORKSPACE_SCOPE_PROFILE="restricted"
          fi

          GOOGLE_WORKSPACE_SCOPES="${{ secrets.GCP_GOOGLE_WORKSPACE_SCOPES }}"
          AI_MAX_REQUEST_BYTES="${{ secrets.GCP_AI_MAX_REQUEST_BYTES }}"
          if [ -z "${AI_MAX_REQUEST_BYTES}" ]; then
            AI_MAX_REQUEST_BYTES="2097152"
          fi

          TEX_ALLOW_ALL_PACKAGES="${{ secrets.GCP_TEX_ALLOW_ALL_PACKAGES }}"
          if [ -z "${TEX_ALLOW_ALL_PACKAGES}" ]; then
            TEX_ALLOW_ALL_PACKAGES="true"
          fi

          TEX_ALLOW_RAW_DOCUMENT="${{ secrets.GCP_TEX_ALLOW_RAW_DOCUMENT }}"
          if [ -z "${TEX_ALLOW_RAW_DOCUMENT}" ]; then
            TEX_ALLOW_RAW_DOCUMENT="true"
          fi

          TEX_ALLOW_RESTRICTED_COMMANDS="${{ secrets.GCP_TEX_ALLOW_RESTRICTED_COMMANDS }}"
          if [ -z "${TEX_ALLOW_RESTRICTED_COMMANDS}" ]; then
            TEX_ALLOW_RESTRICTED_COMMANDS="false"
          fi

          TEX_ALLOWED_PACKAGES="${{ secrets.GCP_TEX_ALLOWED_PACKAGES }}"
          if [ -z "${TEX_ALLOWED_PACKAGES}" ]; then
            TEX_ALLOWED_PACKAGES="amsmath,amssymb,amsthm,array,booktabs,caption,enumitem,etoolbox,fancyhdr,float,fontspec,geometry,graphicx,hyperref,inputenc,latexsym,listings,longtable,makecell,mathtools,multirow,setspace,soul,tabularx,tcolorbox,titlesec,ulem,xcolor,xeCJK"
          fi

          GOOGLE_CLIENT_SECRET_SECRET="${{ secrets.GCP_GOOGLE_CLIENT_SECRET_SECRET_NAME }}"
          if [ -z "${GOOGLE_CLIENT_SECRET_SECRET}" ]; then
            GOOGLE_CLIENT_SECRET_SECRET="google-client-secret"
          fi

          AI_DIAGNOSTICS_TOKEN_SECRET="${{ secrets.GCP_AI_DIAGNOSTICS_TOKEN_SECRET_NAME }}"
          if [ -z "${AI_DIAGNOSTICS_TOKEN_SECRET}" ]; then
            AI_DIAGNOSTICS_TOKEN_SECRET="ai-diagnostics-token"
          fi

          TEX_SERVICE_AUTH_TOKEN_SECRET="${{ secrets.GCP_TEX_SERVICE_AUTH_TOKEN_SECRET_NAME }}"
          if [ -z "${TEX_SERVICE_AUTH_TOKEN_SECRET}" ]; then
            TEX_SERVICE_AUTH_TOKEN_SECRET="tex-service-auth-token"
          fi

          ensure_secret_access "${GOOGLE_CLIENT_SECRET_SECRET}"
          ensure_secret_access "${TEX_SERVICE_AUTH_TOKEN_SECRET}"

          DIAGNOSTICS_SECRET_STATUS="$(get_optional_secret_status "${AI_DIAGNOSTICS_TOKEN_SECRET}")"

          echo "Deployment summary:"
          echo "  project: ${PROJECT_ID}"
          echo "  region: ${GCP_REGION}"
          echo "  ai_url_source: Cloud Run service ${AI_SERVICE_NAME}"
          echo "  frontend_origin: ${WORKSPACE_FRONTEND_ORIGIN}"
          echo "  oauth_redirect_uri: ${GOOGLE_OAUTH_REDIRECT_URI}"
          echo "  tex_service_base_url: ${TEX_SERVICE_BASE_URL}"
          echo "  tex_allow_all_packages: ${TEX_ALLOW_ALL_PACKAGES}"
          echo "  tex_allow_raw_document: ${TEX_ALLOW_RAW_DOCUMENT}"
          echo "  tex_allow_restricted_commands: ${TEX_ALLOW_RESTRICTED_COMMANDS}"
          echo "  diagnostics_secret_name: ${AI_DIAGNOSTICS_TOKEN_SECRET}"
          echo "  diagnostics_secret_status: ${DIAGNOSTICS_SECRET_STATUS}"

          export AI_ALLOWED_ORIGIN="${ALLOWED_ORIGIN}"
          export GOOGLE_CLIENT_ID="${{ secrets.GCP_GOOGLE_CLIENT_ID }}"
          export GOOGLE_OAUTH_PUBLISHING_STATUS
          export GOOGLE_OAUTH_REDIRECT_URI
          export GOOGLE_WORKSPACE_SCOPES
          export GOOGLE_WORKSPACE_SCOPE_PROFILE
          export WORKSPACE_FRONTEND_ORIGIN
          export AI_MAX_REQUEST_BYTES
          export TEX_ALLOW_ALL_PACKAGES
          export TEX_ALLOW_RAW_DOCUMENT
          export TEX_ALLOW_RESTRICTED_COMMANDS
          export TEX_ALLOWED_PACKAGES

          node scripts/validate-public-deploy-config.mjs

          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${AI_SERVICE_NAME}:latest"
          SUBSTITUTIONS=$(printf '^|^_IMAGE_URI=%s|_REGION=%s|_VERTEX_LOCATION=%s|_SERVICE_NAME=%s|_GEMINI_MODEL=%s|_GEMINI_FALLBACK_MODEL=%s|_AI_ALLOWED_ORIGIN=%s|_AI_MAX_REQUEST_BYTES=%s|_GOOGLE_CLIENT_ID=%s|_GOOGLE_OAUTH_REDIRECT_URI=%s|_GOOGLE_OAUTH_PUBLISHING_STATUS=%s|_GOOGLE_WORKSPACE_SCOPE_PROFILE=%s|_WORKSPACE_FRONTEND_ORIGIN=%s|_GOOGLE_WORKSPACE_SCOPES=%s|_AI_DIAGNOSTICS_TOKEN_SECRET=%s|_GOOGLE_CLIENT_SECRET_SECRET=%s|_TEX_SERVICE_AUTH_TOKEN_SECRET=%s|_TEX_ALLOW_ALL_PACKAGES=%s|_TEX_ALLOW_RAW_DOCUMENT=%s|_TEX_ALLOW_RESTRICTED_COMMANDS=%s|_TEX_ALLOWED_PACKAGES=%s|_TEX_SERVICE_BASE_URL=%s|_RUN_SERVICE_ACCOUNT=%s' \
            "$IMAGE_URI" \
            "$GCP_REGION" \
            "$VERTEX_LOCATION" \
            "$AI_SERVICE_NAME" \
            "$GEMINI_MODEL" \
            "$GEMINI_FALLBACK_MODEL" \
            "$ALLOWED_ORIGIN" \
            "$AI_MAX_REQUEST_BYTES" \
            "${{ secrets.GCP_GOOGLE_CLIENT_ID }}" \
            "${GOOGLE_OAUTH_REDIRECT_URI}" \
            "${GOOGLE_OAUTH_PUBLISHING_STATUS}" \
            "${GOOGLE_WORKSPACE_SCOPE_PROFILE}" \
            "${WORKSPACE_FRONTEND_ORIGIN}" \
            "${GOOGLE_WORKSPACE_SCOPES}" \
            "${AI_DIAGNOSTICS_TOKEN_SECRET}" \
            "${GOOGLE_CLIENT_SECRET_SECRET}" \
            "${TEX_SERVICE_AUTH_TOKEN_SECRET}" \
            "${TEX_ALLOW_ALL_PACKAGES}" \
            "${TEX_ALLOW_RAW_DOCUMENT}" \
            "${TEX_ALLOW_RESTRICTED_COMMANDS}" \
            "${TEX_ALLOWED_PACKAGES}" \
            "${TEX_SERVICE_BASE_URL}" \
            "$RUN_SERVICE_ACCOUNT")

          gcloud builds submit \
            --config cloudbuild.ai.yaml \
            --substitutions="${SUBSTITUTIONS}" \
            .

          AI_URL="$(gcloud run services describe ${AI_SERVICE_NAME} --region ${GCP_REGION} --format='value(status.url)')"

          if [ -z "${AI_URL}" ]; then
            echo "Cloud Run service URL could not be resolved."
            exit 1
          fi

          echo "AI service deployed at: ${AI_URL}"
          echo "url=${AI_URL}" >> "${GITHUB_OUTPUT}"

      - name: Verify AI health
        run: |
          set -euo pipefail
          echo "Verifying AI health at: ${{ steps.ai.outputs.url }}/api/ai/health"
          for i in {1..10}; do
            if curl -fsS "${{ steps.ai.outputs.url }}/api/ai/health" >/dev/null; then
              echo "AI health check passed!"
              break
            fi
            echo "AI health check failed (attempt $i), retrying in 5 seconds..."
            sleep 5
            if [ "$i" -eq 10 ]; then
              exit 1
            fi
          done

      - name: Verify AI to TeX proxy health
        run: |
          set -euo pipefail
          echo "Verifying AI TeX proxy health at: ${{ steps.ai.outputs.url }}/api/tex/health"
          for i in {1..10}; do
            if curl -fsS "${{ steps.ai.outputs.url }}/api/tex/health" >/dev/null; then
              echo "AI TeX proxy health check passed!"
              exit 0
            fi
            echo "AI TeX proxy health check failed (attempt $i), retrying in 5 seconds..."
            sleep 5
          done

          echo "AI TeX proxy health check failed after 10 attempts."
          exit 1

      - name: Verify internal AI diagnostics health
        run: |
          set -euo pipefail
          get_optional_secret_status() {
            local secret_name="$1"
            local output
            if output="$(gcloud secrets versions access latest --secret="${secret_name}" --project "${{ secrets.GCP_PROJECT_ID }}" 2>&1 >/dev/null)"; then
              echo "present"
              return 0
            fi

            if printf '%s' "${output}" | grep -qi 'NOT_FOUND'; then
              echo "missing"
              return 0
            fi

            echo "Unable to access optional Secret Manager secret ${secret_name}."
            if printf '%s' "${output}" | grep -qi 'PERMISSION_DENIED'; then
              ACTIVE_ACCOUNT="$(gcloud auth list --filter=status:ACTIVE --format='value(account)' | head -n 1)"
              echo "Grant roles/secretmanager.secretAccessor on ${secret_name} to ${ACTIVE_ACCOUNT}."
            fi
            echo "${output}"
            exit 1
          }

          TOKEN_SECRET_NAME="${{ secrets.GCP_AI_DIAGNOSTICS_TOKEN_SECRET_NAME }}"
          if [ -z "${TOKEN_SECRET_NAME}" ]; then
            TOKEN_SECRET_NAME="ai-diagnostics-token"
          fi

          SECRET_STATUS="$(get_optional_secret_status "${TOKEN_SECRET_NAME}")"
          if [ "${SECRET_STATUS}" = "missing" ]; then
            echo "Diagnostics secret ${TOKEN_SECRET_NAME} not found. Skipping internal diagnostics health check."
            exit 0
          fi

          DIAGNOSTICS_TOKEN="$(gcloud secrets versions access latest --secret="${TOKEN_SECRET_NAME}")"
          echo "Verifying internal AI diagnostics health at: ${{ steps.ai.outputs.url }}/api/internal/ai/health"
          for i in {1..10}; do
            if curl -fsS \
              -H "X-Docsy-Diagnostics-Token: ${DIAGNOSTICS_TOKEN}" \
              "${{ steps.ai.outputs.url }}/api/internal/ai/health" >/dev/null; then
              echo "Internal AI diagnostics health check passed!"
              exit 0
            fi
            echo "Internal AI diagnostics health check failed (attempt $i), retrying in 5 seconds..."
            sleep 5
          done

          echo "Internal AI diagnostics health check failed after 10 attempts."
          exit 1
