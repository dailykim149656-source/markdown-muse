name: Deploy to GCP

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_frontend:
        description: "Deploy frontend even if AI URL cannot be derived from Cloud Run yet"
        default: "false"
        required: false
        type: string

permissions:
  contents: read

jobs:
  deploy-ai:
    name: Deploy AI service (Cloud Run)
    runs-on: ubuntu-latest
    outputs:
      ai_service_url: ${{ steps.ai.outputs.url }}
    env:
      GCP_REGION: asia-northeast3
      AI_SERVICE_NAME: docsy
      ARTIFACT_REPOSITORY: docsy
      GEMINI_MODEL: gemini-2.5-flash
      GEMINI_API_KEY_SECRET: gemini-api-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy AI service via Cloud Build
        id: ai
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "GCP_PROJECT_ID is required."
            exit 1
          fi
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          PROJECT_NUMBER="$(gcloud projects describe "${PROJECT_ID}" --format='value(projectNumber)')"
          RUN_SERVICE_ACCOUNT="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"

          ALLOWED_ORIGIN="${{ secrets.GCP_AI_ALLOWED_ORIGIN }}"
          if [ -z "$ALLOWED_ORIGIN" ]; then
            ALLOWED_ORIGIN="*"
          fi

          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${AI_SERVICE_NAME}:latest"
          SUBSTITUTIONS=$(printf '_IMAGE_URI=%s,_REGION=%s,_SERVICE_NAME=%s,_GEMINI_MODEL=%s,_AI_ALLOWED_ORIGIN=%s,_GEMINI_API_KEY_SECRET=%s,_RUN_SERVICE_ACCOUNT=%s' \
            "$IMAGE_URI" \
            "$GCP_REGION" \
            "$AI_SERVICE_NAME" \
            "$GEMINI_MODEL" \
            "$ALLOWED_ORIGIN" \
            "$GEMINI_API_KEY_SECRET" \
            "$RUN_SERVICE_ACCOUNT")

          gcloud builds submit \
            --config cloudbuild.ai.yaml \
            --substitutions="${SUBSTITUTIONS}" \
            .

          AI_URL="$(gcloud run services describe ${AI_SERVICE_NAME} --region ${GCP_REGION} --format='value(status.url)')"

          if [ -z "${AI_URL}" ]; then
            echo "Cloud Run service URL could not be resolved."
            exit 1
          fi

          echo "url=${AI_URL}" >> "${GITHUB_OUTPUT}"

      - name: Verify AI health
        run: |
          set -euo pipefail
          echo "Verifying health at: ${{ steps.ai.outputs.url }}/api/ai/health"
          for i in {1..10}; do
            if curl -fsS "${{ steps.ai.outputs.url }}/api/ai/health" >/dev/null; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Health check failed (attempt $i), retrying in 5 seconds..."
            sleep 5
          done
          echo "Health check failed after 10 attempts."
          exit 1

  deploy-web:
    name: Deploy web profile frontend to Cloud Storage
    needs: deploy-ai
    runs-on: ubuntu-latest
    env:
      BUCKET: ${{ secrets.GCP_FRONTEND_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build web profile frontend
        run: |
          set -euo pipefail

          if [ -z "${BUCKET}" ]; then
            echo "GCP_FRONTEND_BUCKET is required."
            exit 1
          fi

          AI_API_BASE_URL="${{ secrets.GCP_WEB_VITE_AI_API_BASE_URL }}"
          if [ -z "${AI_API_BASE_URL}" ]; then
            AI_API_BASE_URL="${{ needs.deploy-ai.outputs.ai_service_url }}"
          fi

          if [ -z "${AI_API_BASE_URL}" ] && [ "${{ github.event.inputs.force_frontend }}" != "true" ]; then
            echo "AI service URL was not resolved. Set GCP_WEB_VITE_AI_API_BASE_URL or use workflow_dispatch with force_frontend=true to override."
            exit 1
          fi

          if [ -z "${AI_API_BASE_URL}" ]; then
            echo "VITE_AI_API_BASE_URL is empty. Refusing to build a frontend that would fall back to /api."
            exit 1
          fi

          case "${AI_API_BASE_URL}" in
            http://*|https://*)
              ;;
            *)
              echo "VITE_AI_API_BASE_URL must be an absolute http(s) URL. Current value: ${AI_API_BASE_URL}"
              exit 1
              ;;
          esac

          echo "Building frontend with VITE_AI_API_BASE_URL=${AI_API_BASE_URL}"

          printf "VITE_APP_PROFILE=web\nVITE_AI_API_BASE_URL=%s\n" "${AI_API_BASE_URL}" > .env.production.local

          npm ci
          npm run build:web

      - name: Verify bundled AI API URL
        run: |
          set -euo pipefail
          AI_API_BASE_URL="${{ secrets.GCP_WEB_VITE_AI_API_BASE_URL }}"
          if [ -z "${AI_API_BASE_URL}" ]; then
            AI_API_BASE_URL="${{ needs.deploy-ai.outputs.ai_service_url }}"
          fi

          if ! grep -R --fixed-strings "${AI_API_BASE_URL}" dist >/dev/null 2>&1; then
            echo "Built frontend does not appear to contain the configured AI API URL."
            echo "Expected URL: ${AI_API_BASE_URL}"
            exit 1
          fi

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_URBAN_DDS }}'
          projectId: urban-dds
          channelId: live

      - name: Verify frontend file
        run: |
          set -euo pipefail
          if [ ! -f "dist/index.html" ]; then
            echo "dist/index.html not found after build."
            exit 1
          fi
          echo "Frontend deployed to gs://${BUCKET}"
