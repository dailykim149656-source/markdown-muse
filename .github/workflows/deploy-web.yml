name: Deploy Web Frontend

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "!src/test/**"
      - "public/**"
      - "index.html"
      - "vite.config.ts"
      - "package.json"
      - "package-lock.json"
      - "postcss.config.*"
      - "tailwind.config.*"
      - "components.json"
      - "firebase.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-web:
    name: Deploy web profile frontend to Firebase Hosting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Firebase Hosting
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_URBAN_DDS }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Build web profile frontend
        run: |
          set -euo pipefail

          AI_API_BASE_URL="${{ secrets.GCP_WEB_VITE_AI_API_BASE_URL }}"
          if [ -z "${AI_API_BASE_URL}" ]; then
            echo "GCP_WEB_VITE_AI_API_BASE_URL is required."
            exit 1
          fi

          case "${AI_API_BASE_URL}" in
            http://*|https://*)
              ;;
            *)
              echo "GCP_WEB_VITE_AI_API_BASE_URL must be an absolute http(s) URL. Current value: ${AI_API_BASE_URL}"
              exit 1
              ;;
          esac

          echo "Building frontend with VITE_AI_API_BASE_URL=${AI_API_BASE_URL}"
          printf "VITE_APP_PROFILE=web\nVITE_AI_API_BASE_URL=%s\n" "${AI_API_BASE_URL}" > .env.web.local

          npm ci
          npm run build:web

      - name: Verify frontend file
        run: |
          set -euo pipefail
          if [ ! -f "dist/index.html" ]; then
            echo "dist/index.html not found after build."
            exit 1
          fi
          echo "Frontend build artifact verified."

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@15.10.0

      - name: Deploy to Firebase Hosting
        run: |
          set -euo pipefail
          firebase deploy \
            --only hosting \
            --project urban-dds \
            --non-interactive
