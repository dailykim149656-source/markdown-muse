name: Deploy Web Frontend

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-web.yml"
      - ".github/workflows/deploy-full-stack.yml"
      - "scripts/check-ai-runtime-smoke.mjs"
      - "scripts/normalize-google-oauth-redirect-uri.mjs"
      - "scripts/resolve-public-deploy-env.mjs"
      - "scripts/validate-public-deploy-config.mjs"
      - "src/**"
      - "!src/test/**"
      - "public/**"
      - "index.html"
      - "vite.config.ts"
      - "package.json"
      - "package-lock.json"
      - "postcss.config.*"
      - "tailwind.config.*"
      - "components.json"
      - "firebase.json"
  workflow_dispatch:

concurrency:
  group: deploy-web-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-web:
    name: Deploy web profile frontend to Firebase Hosting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Firebase Hosting
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_URBAN_DDS }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Build web profile frontend
        run: |
          set -euo pipefail

          require_secret() {
            local name="$1"
            local value="$2"
            if [ -z "${value}" ]; then
              echo "${name} is required."
              exit 1
            fi
          }
          export DOCSY_PUBLIC_FRONTEND_ORIGIN="https://docsy.cyou"
          export GCP_AI_ALLOWED_ORIGIN="${{ secrets.GCP_AI_ALLOWED_ORIGIN }}"
          export GCP_GOOGLE_OAUTH_PUBLISHING_STATUS="${{ secrets.GCP_GOOGLE_OAUTH_PUBLISHING_STATUS }}"
          export GCP_GOOGLE_OAUTH_REDIRECT_URI="${{ secrets.GCP_GOOGLE_OAUTH_REDIRECT_URI }}"
          export GCP_GOOGLE_WORKSPACE_SCOPES="${{ secrets.GCP_GOOGLE_WORKSPACE_SCOPES }}"
          export GCP_GOOGLE_WORKSPACE_SCOPE_PROFILE="${{ secrets.GCP_GOOGLE_WORKSPACE_SCOPE_PROFILE }}"
          export GCP_WORKSPACE_FRONTEND_ORIGIN="${{ secrets.GCP_WORKSPACE_FRONTEND_ORIGIN }}"
          export GCP_WEB_VITE_AI_API_BASE_URL="${{ secrets.GCP_WEB_VITE_AI_API_BASE_URL }}"
          eval "$(node scripts/resolve-public-deploy-env.mjs --target web)"

          case "${AI_API_BASE_URL}" in
            http://*|https://*)
              ;;
            *)
              echo "GCP_WEB_VITE_AI_API_BASE_URL must be an absolute http(s) URL. Current value: ${AI_API_BASE_URL}"
              exit 1
              ;;
          esac

          export AI_ALLOWED_ORIGIN="${FRONTEND_ORIGIN}"
          export GOOGLE_CLIENT_ID="${{ secrets.GCP_GOOGLE_CLIENT_ID }}"
          export GOOGLE_OAUTH_PUBLISHING_STATUS
          export GOOGLE_OAUTH_REDIRECT_URI
          export GOOGLE_WORKSPACE_SCOPES="${{ secrets.GCP_GOOGLE_WORKSPACE_SCOPES }}"
          export GOOGLE_WORKSPACE_SCOPE_PROFILE
          export PUBLIC_DEPLOY_EXPECTED_FRONTEND_ORIGIN="${EXPECTED_PUBLIC_FRONTEND_ORIGIN}"
          export WORKSPACE_FRONTEND_ORIGIN="${FRONTEND_ORIGIN}"

          require_secret "GCP_GOOGLE_CLIENT_ID" "${{ secrets.GCP_GOOGLE_CLIENT_ID }}"

          FIREBASE_PROJECT_ID="${{ secrets.GCP_FIREBASE_PROJECT_ID }}"
          if [ -z "${FIREBASE_PROJECT_ID}" ]; then
            FIREBASE_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          fi
          FRONTEND_BUILD_ID="${GITHUB_SHA:-local-dev}"

          echo "Deployment summary:"
          echo "  firebase_project: ${FIREBASE_PROJECT_ID}"
          echo "  browser_api_base_url: ${AI_API_BASE_URL}"
          echo "  expected_public_frontend_origin: ${EXPECTED_PUBLIC_FRONTEND_ORIGIN}"
          echo "  frontend_origin: ${FRONTEND_ORIGIN}"
          echo "  routing_mode: ${ROUTING_MODE}"
          echo "  oauth_redirect_uri: ${GOOGLE_OAUTH_REDIRECT_URI}"
          echo "  frontend_build_id: ${FRONTEND_BUILD_ID}"

          export VITE_AI_API_BASE_URL="${AI_API_BASE_URL}"
          node scripts/validate-public-deploy-config.mjs

          echo "Building frontend with VITE_AI_API_BASE_URL=${AI_API_BASE_URL}"
          printf "VITE_APP_PROFILE=web\nVITE_AI_API_BASE_URL=%s\nVITE_APP_BUILD_ID=%s\n" "${AI_API_BASE_URL}" "${FRONTEND_BUILD_ID}" > .env.web.local

          npm ci
          npm run build:web

      - name: Verify frontend file
        run: |
          set -euo pipefail
          if [ ! -f "dist/index.html" ]; then
            echo "dist/index.html not found after build."
            exit 1
          fi
          echo "Frontend build artifact verified."

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@15.10.0

      - name: Verify Firebase Hosting project access
        run: |
          set -euo pipefail
          FIREBASE_PROJECT_ID="${{ secrets.GCP_FIREBASE_PROJECT_ID }}"
          if [ -z "${FIREBASE_PROJECT_ID}" ]; then
            FIREBASE_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          fi

          ACCESS_TOKEN="$(gcloud auth print-access-token)"
          RESPONSE="$(curl -sS -w '\n%{http_code}' \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            "https://firebasehosting.googleapis.com/v1beta1/projects/${FIREBASE_PROJECT_ID}/sites")"
          HTTP_STATUS="$(printf '%s\n' "${RESPONSE}" | tail -n 1)"
          RESPONSE_BODY="$(printf '%s\n' "${RESPONSE}" | sed '$d')"

          if [ "${HTTP_STATUS}" != "200" ]; then
            ACTIVE_ACCOUNT="$(gcloud auth list --filter=status:ACTIVE --format='value(account)' | head -n 1)"
            echo "Unable to access Firebase Hosting project ${FIREBASE_PROJECT_ID}."
            echo "Check that GCP_FIREBASE_PROJECT_ID points to a Firebase-enabled project and that FIREBASE_SERVICE_ACCOUNT_URBAN_DDS can access it."
            echo "Active deploy principal: ${ACTIVE_ACCOUNT}"
            echo "${RESPONSE_BODY}"
            exit 1
          fi

          echo "Firebase Hosting project access verified for ${FIREBASE_PROJECT_ID}."

      - name: Deploy to Firebase Hosting
        run: |
          set -euo pipefail
          FIREBASE_PROJECT_ID="${{ secrets.GCP_FIREBASE_PROJECT_ID }}"
          if [ -z "${FIREBASE_PROJECT_ID}" ]; then
            FIREBASE_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          fi
          echo "Deploying frontend to Firebase project: ${FIREBASE_PROJECT_ID}"
          firebase deploy \
            --only hosting \
            --project "${FIREBASE_PROJECT_ID}" \
            --non-interactive

      - name: Verify AI runtime smoke through frontend origin
        run: |
          set -euo pipefail
          export DOCSY_PUBLIC_FRONTEND_ORIGIN="https://docsy.cyou"
          export GCP_AI_ALLOWED_ORIGIN="${{ secrets.GCP_AI_ALLOWED_ORIGIN }}"
          export GCP_WORKSPACE_FRONTEND_ORIGIN="${{ secrets.GCP_WORKSPACE_FRONTEND_ORIGIN }}"
          eval "$(node scripts/resolve-public-deploy-env.mjs --target web)"

          for i in {1..10}; do
            if node scripts/check-ai-runtime-smoke.mjs --origin "${FRONTEND_ORIGIN}" --label "Frontend same-origin rewrite"; then
              echo "Frontend same-origin AI runtime smoke check passed!"
              exit 0
            fi
            echo "Frontend same-origin AI runtime smoke check failed (attempt $i), retrying in 5 seconds..."
            sleep 5
          done

          echo "Frontend same-origin AI runtime smoke check failed after 10 attempts."
          exit 1
